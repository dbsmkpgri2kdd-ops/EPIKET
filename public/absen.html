<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioScan Pro - Sistem Absensi</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
        .scanning-line {
            width: 100%; height: 2px; background: #22d3ee; position: absolute; top: 0;
            box-shadow: 0 0 15px #22d3ee; animation: scan 3s infinite; z-index: 10;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .hidden-view { display: none !important; }
        select option { background: #0f172a; color: #fff; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <nav class="w-full max-w-7xl flex justify-between items-center py-6 px-4 z-50">
        <div>
            <h1 class="text-2xl font-bold font-['Orbitron'] tracking-tighter neon-text">BIOSCAN <span class="text-cyan-400">PRIDA</span></h1>
            <p class="text-[9px] uppercase tracking-[0.3em] text-slate-500">Sistem Absensi Biometrik</p>
        </div>
        <div class="flex items-center gap-6">
            <div id="clock" class="font-mono text-xl font-bold">00:00:00</div>
            <button onclick="toggleAdmin()" class="px-5 py-1.5 border border-cyan-500/30 rounded-full text-[10px] font-bold tracking-widest hover:bg-cyan-500/10 transition">ADMIN PANEL</button>
        </div>
    </nav>

    <!-- TAMPILAN ABSENSI -->
    <main id="scanView" class="w-full max-w-7xl mt-6 grid grid-cols-1 lg:grid-cols-5 gap-8 items-start">
        <div class="lg:col-span-3 relative aspect-video glass rounded-[2rem] overflow-hidden border border-slate-800 shadow-2xl">
            <video id="videoAbsen" autoplay muted playsinline class="w-full h-full object-cover"></video>
            <div class="scanning-line"></div>
            <div id="cameraErrorAbsen" class="hidden absolute inset-0 bg-slate-950 flex flex-col items-center justify-center text-center p-6">
                <p class="text-rose-500 font-bold uppercase text-xs mb-2 tracking-widest">Akses Kamera Ditolak</p>
            </div>
        </div>

        <div class="lg:col-span-2 flex flex-col space-y-6">
            <div id="infoCard" class="glass p-10 rounded-[2rem] min-h-[350px] flex flex-col justify-center border-l-4 border-cyan-500 shadow-2xl transition-all">
                <div id="waitMsg" class="text-center space-y-6">
                    <div class="w-14 h-14 border-4 border-cyan-500/20 border-t-cyan-500 rounded-full animate-spin mx-auto"></div>
                    <p class="text-slate-400 tracking-[0.2em] uppercase text-xs font-bold">Memindai Wajah...</p>
                </div>
                
                <div id="resultBox" class="hidden space-y-8">
                    <div>
                        <p class="text-cyan-400 text-[10px] font-bold uppercase tracking-[0.3em] mb-2">Terverifikasi</p>
                        <h2 id="resName" class="text-4xl font-bold text-white leading-none">---</h2>
                        <p id="resSub" class="text-slate-500 text-sm mt-3 tracking-wide">---</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="submitPresence('Masuk')" class="py-4 bg-cyan-600 hover:bg-cyan-500 rounded-2xl font-bold uppercase text-xs tracking-widest transition-all">Masuk</button>
                        <button onclick="submitPresence('Pulang')" class="py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-bold uppercase text-xs tracking-widest transition-all">Pulang</button>
                    </div>
                    <button onclick="resetScan()" class="w-full text-slate-600 text-[10px] font-bold uppercase tracking-widest hover:text-white transition">Reset Scan</button>
                </div>
            </div>
            <div class="flex items-center gap-3 px-6">
                <div class="w-2 h-2 bg-cyan-500 rounded-full animate-pulse"></div>
                <p id="status" class="text-[10px] text-slate-500 uppercase tracking-widest">Status: Sistem Ready</p>
            </div>
        </div>
    </main>

    <!-- TAMPILAN ADMIN -->
    <main id="adminView" class="hidden-view w-full max-w-7xl mt-6 grid grid-cols-1 lg:grid-cols-4 gap-8">
        <div class="glass p-8 rounded-[2rem] space-y-6 border border-slate-800">
            <h3 class="text-cyan-400 font-bold text-xs tracking-widest uppercase">Konfigurasi Sheet</h3>
            <div class="space-y-4">
                <p class="text-[10px] text-slate-400 italic leading-relaxed">Link Sheet sudah dikunci secara default.</p>
                <input type="text" id="csvSiswa" placeholder="URL CSV Sheet Siswa" class="w-full p-3 bg-slate-950 rounded-xl text-xs border border-slate-800 text-cyan-100 outline-none">
                <input type="text" id="csvBio" placeholder="URL CSV Sheet DataBiometrik" class="w-full p-3 bg-slate-950 rounded-xl text-xs border border-slate-800 text-emerald-100 outline-none">
                <button onclick="syncData()" class="w-full py-3 bg-cyan-700 hover:bg-cyan-600 rounded-xl font-bold text-[10px] uppercase tracking-widest transition">Sync Database</button>
            </div>
            <div id="log" class="h-48 overflow-y-auto font-mono text-[9px] text-slate-500 bg-black/40 p-4 rounded-xl border border-white/5"></div>
        </div>

        <div class="lg:col-span-3 glass p-10 rounded-[2rem] border border-slate-800">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="aspect-video bg-black rounded-2xl overflow-hidden relative border border-slate-800">
                    <video id="videoEnroll" autoplay muted playsinline class="w-full h-full object-cover"></video>
                    <div id="cameraErrorEnroll" class="hidden absolute inset-0 bg-slate-950 flex items-center justify-center text-[10px] text-rose-500">Kamera Error</div>
                </div>
                <div class="space-y-6 flex flex-col justify-center">
                    <h3 class="text-white font-bold uppercase text-lg tracking-tight">Daftarkan Wajah</h3>
                    <div class="space-y-4">
                        <select id="kelasFilter" onchange="filterPersonel()" class="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl text-xs text-white"></select>
                        <select id="personSelect" class="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl text-xs text-cyan-400"></select>
                        <button id="btnEnroll" onclick="enroll()" class="w-full py-5 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-bold text-xs uppercase tracking-[0.2em] transition-all">Simpan Biometrik</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "<?= getScriptUrl() ?>"; 

        // SILAKAN MASUKKAN LINK CSV ANDA DI SINI AGAR TERKUNCI PERMANEN
        const DEFAULT_CSV_SISWA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQmPAKDtZCHn6Zu9hGCUT1Euf18vz54CuLI5KZ30pjtle7I5sOVLgNG7BNxF50SbTd64d5z3SKKa1Tx/pub?gid=0&single=true&output=csv";
        const DEFAULT_CSV_BIOMETRIK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQmPAKDtZCHn6Zu9hGCUT1Euf18vz54CuLI5KZ30pjtle7I5sOVLgNG7BNxF50SbTd64d5z3SKKa1Tx/pub?gid=1493692368&single=true&output=csv";

        let faceMatcher = null, isPaused = false, isAdmin = false, lastPerson = null, allPersonel = [];

        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'), 1000);

        function logger(msg, isError = false) {
            const log = document.getElementById('log');
            log.innerHTML += `<div class="${isError ? 'text-rose-500' : 'text-slate-400'} mb-1">> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        async function init() {
            // Cek apakah ada di localStorage, jika tidak pakai Default yang dikunci di atas
            document.getElementById('csvSiswa').value = localStorage.getItem('csvSiswa') || DEFAULT_CSV_SISWA;
            document.getElementById('csvBio').value = localStorage.getItem('csvBio') || DEFAULT_CSV_BIOMETRIK;

            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                document.getElementById('status').innerText = "Loading Models...";
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                document.getElementById('status').innerText = "System Ready";
                handleCamera(document.getElementById('videoAbsen'), 'cameraErrorAbsen');
                startRecognition();
                
                // Otomatis sinkronisasi jika link sudah ada saat aplikasi dimuat
                if(document.getElementById('csvSiswa').value !== "MASUKKAN_LINK_CSV_SISWA_DI_SINI") {
                    syncData();
                }
            } catch (e) { logger("Model Error: " + e.message, true); }
        }

        async function handleCamera(videoElem, errorId) {
            if (window.currentStream) window.currentStream.getTracks().forEach(t => t.stop());
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                window.currentStream = stream;
                videoElem.srcObject = stream;
                document.getElementById(errorId).classList.add('hidden');
            } catch (e) { document.getElementById(errorId).classList.remove('hidden'); }
        }

        async function startRecognition() {
            if (!isPaused && !isAdmin && faceMatcher) {
                const video = document.getElementById('videoAbsen');
                const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                if (det) {
                    const match = faceMatcher.findBestMatch(det.descriptor);
                    if (match.label !== 'unknown' && match.distance < 0.45) displayMatch(match.label);
                }
            }
            requestAnimationFrame(() => setTimeout(startRecognition, 200));
        }

        function displayMatch(label) {
            isPaused = true;
            try {
                const data = JSON.parse(label);
                lastPerson = data;
                document.getElementById('resName').innerText = data.nama.toUpperCase();
                document.getElementById('resSub').innerText = `${data.nis} • ${data.kelas} • ${data.tipe}`;
                document.getElementById('waitMsg').classList.add('hidden');
                document.getElementById('resultBox').classList.remove('hidden');
            } catch(e) { isPaused = false; }
        }

        function resetScan() {
            isPaused = false;
            document.getElementById('resultBox').classList.add('hidden');
            document.getElementById('waitMsg').classList.remove('hidden');
        }

        async function syncData() {
            const dbUrl = document.getElementById('csvSiswa').value.trim();
            const bioUrl = document.getElementById('csvBio').value.trim();
            
            if(!dbUrl || dbUrl.includes("MASUKKAN_LINK")) return logger("Link CSV belum diatur.", true);
            
            localStorage.setItem('csvSiswa', dbUrl);
            localStorage.setItem('csvBio', bioUrl);

            try {
                logger("Fetching data dari Sheet Siswa...");
                const res = await fetch(dbUrl);
                const csv = await res.text();
                const rows = csv.split('\n').filter(r => r.trim() !== '');
                
                allPersonel = rows.slice(1).map(r => {
                    const c = r.split(',').map(s => s.trim());
                    return { nis: c[0], nama: c[1], kelas: c[2], sesi: c[3], tipe: c[4] };
                });
                
                const classes = [...new Set(allPersonel.map(p => p.kelas))].sort();
                document.getElementById('kelasFilter').innerHTML = '<option value="">-- Pilih Kelas --</option>' + 
                    classes.map(k => `<option value="${k}">${k}</option>`).join('');
                
                if(bioUrl && !bioUrl.includes("MASUKKAN_LINK")) {
                    logger("Loading data biometrik...");
                    const bRes = await fetch(bioUrl);
                    const bCsv = await bRes.text();
                    const bRows = bCsv.split('\n').filter(r => r.trim() !== '');
                    
                    if(bRows.length > 1) {
                        const labeled = bRows.slice(1).map(r => {
                            try {
                                const c = r.split(',').map(s => s.trim());
                                if(!c[2]) return null;
                                const desc = new Float32Array(JSON.parse(c[2]));
                                const meta = JSON.stringify({nama:c[0], nis:c[1], kelas:c[3], sesi:c[4], tipe:c[5]});
                                return new faceapi.LabeledFaceDescriptors(meta, [desc]);
                            } catch(err) { return null; }
                        }).filter(d => d);
                        
                        if(labeled.length > 0) {
                            faceMatcher = new faceapi.FaceMatcher(labeled, 0.45);
                            logger(labeled.length + " Wajah terdaftar.");
                        }
                    }
                }
                logger("Sinkronisasi Selesai.");
            } catch (e) { logger("Gagal Sync: " + e.message, true); }
        }

        function filterPersonel() {
            const k = document.getElementById('kelasFilter').value;
            const filtered = allPersonel.filter(p => p.kelas === k);
            document.getElementById('personSelect').innerHTML = filtered.map(p => `<option value='${JSON.stringify(p)}'>${p.nama}</option>`).join('');
        }

        async function enroll() {
            const sel = document.getElementById('personSelect').value;
            if(!sel) return alert("Pilih Nama!");
            const btn = document.getElementById('btnEnroll');
            btn.disabled = true; btn.innerText = "Memproses...";
            
            const person = JSON.parse(sel);
            const det = await faceapi.detectSingleFace(document.getElementById('videoEnroll'), new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if(!det) {
                btn.disabled = false; btn.innerText = "Simpan Biometrik";
                return logger("Wajah tidak terdeteksi!", true);
            }
            
            const payload = { 
                action: 'enroll', ...person, 
                biometric: JSON.stringify(Array.from(det.descriptor)),
                timestamp: new Date().toLocaleString('id-ID')
            };

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' })
                .then(() => {
                    logger("Berhasil Daftar: " + person.nama);
                    btn.disabled = false; btn.innerText = "Simpan Biometrik";
                });
        }

        async function submitPresence(type) {
            if(!lastPerson) return;
            const payload = { action: 'attendance', type: type, ...lastPerson, timestamp: new Date().toLocaleString('id-ID') };
            document.getElementById('status').innerText = "Logging...";
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' })
                .then(() => {
                    document.getElementById('status').innerText = "Berhasil";
                    setTimeout(resetScan, 2000);
                });
        }

        function toggleAdmin() {
            if(!isAdmin && prompt("Password:") !== "1234") return;
            isAdmin = !isAdmin;
            document.getElementById('scanView').classList.toggle('hidden-view', isAdmin);
            document.getElementById('adminView').classList.toggle('hidden-view', !isAdmin);
            handleCamera(isAdmin ? document.getElementById('videoEnroll') : document.getElementById('videoAbsen'), isAdmin ? 'cameraErrorEnroll' : 'cameraErrorAbsen');
        }

        window.onload = init;
    </script>
</body>
</html>
