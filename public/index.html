 <script>
// ================== CONFIG & INIT ==================
const firebaseConfig = {
    apiKey: "AIzaSyC8KQzupwLouy6zSxiz5V5-kB6jPvigCII",
    authDomain: "e-absensi-9be8b.firebaseapp.com",
    projectId: "e-absensi-9be8b",
    databaseURL: "https://e-absensi-9be8b-default-rtdb.firebaseio.com",
    storageBucket: "e-absensi-9be8b.firebasestorage.app",
    messagingSenderId: "828041116350", 
    appId: "1:828041116350:web:8cf5617195e140ec58fcef"
};

// Path utama sesuai dengan Rule Firestore Anda
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const APP_PATH = "stm-pgri2-kdd-v3";
const BIOMETRIC_PATH = `artifacts/${APP_PATH}/public/biometrics`; 
const SETTINGS_PATH = `artifacts/${APP_PATH}/public/config/settings`;
const ABSENSI_PATH = `artifacts/${APP_PATH}/public/records`;

let siswaData = [], settings = {}, isLocationValid = false;
let faceMatcher = null, lastAttendance = {};
let currentFacingMode = "user", currentStream = null;
const video = document.getElementById('video');
const logContent = document.getElementById('log-content');
const gpsStatus = document.getElementById('gps-status');

// ================== INITIALIZATION ==================
window.onload = async () => {
    initTheme(); listenToCloudSettings(); await loadModels(); await startVideo();
    startGpsTracking(); initFaceDetection(); loadLaporan(); autoSelectType(); await syncFaceDatabase();
};

async function loadModels() {
        addLog("⏳ Memuat AI...");
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            addLog("✅ AI Siap.");
        } catch (e) { addLog("❌ Gagal AI: " + e.message); }
    }

// ================== CAMERA & FACE CORE ==================
async function startVideo() {
        try {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            currentStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: currentFacingMode, width: 640, height: 480 }
            });
            video.srcObject = currentStream;
        } catch (e) { addLog("❌ Kamera Error."); }
    }

function switchCamera() {
    currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
    addLog("🔄 Ganti kamera..."); startVideo();
}


async function syncFaceDatabase() {
    addLog("🔄 Sinkronisasi wajah (Firestore)...");
    try {
        // Mengakses koleksi biometrics di dalam path public
        const snapshot = await db.collection("artifacts").doc(APP_PATH)
                                  .collection("public").doc("biometrics")
                                  .collection("face_data").get();
        if (snapshot.empty) return addLog("⚠️ Database Wajah Kosong.");
        const labeled = [];
        snapshot.forEach(doc => {
            const user = doc.data();
            if (user.descriptor) {
                const desc = new Float32Array(JSON.parse(user.descriptor));
                labeled.push(new faceapi.LabeledFaceDescriptors(user.nis, [desc]));
            }
        });
        faceMatcher = new faceapi.FaceMatcher(labeled, 0.45);
        addLog("✅ Database Wajah Sinkron.");
    } catch (e) { addLog("❌ Gagal: " + e.message); }
}
let faceDetectionInterval;
// Perbaikan pada interval deteksi agar tidak lag
async function initFaceDetection() {
    video.onplay = () => {
        const canvas = faceapi.createCanvasFromMedia(video);
        const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
        faceapi.matchDimensions(canvas, displaySize);
        document.querySelector('.video-container').append(canvas);

        if (faceDetectionInterval) clearInterval(faceDetectionInterval);
        
        faceDetectionInterval = setInterval(async () => {
            // Tambahkan pengecekan visibilitas tab untuk hemat baterai
            if (!isLocationValid || !faceMatcher || document.hidden) return;

            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptors();

            const resized = faceapi.resizeResults(detections, displaySize);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            resized.forEach(det => {
                const match = faceMatcher.findBestMatch(det.descriptor);
                // Threshold 0.45 sudah bagus, tapi 0.40 lebih aman dari false positive
                if (match.label !== 'unknown' && match.distance < 0.42) {
                    recordAttendance(match.label);
                }
                
                // Gambar hanya jika perlu debugging
                new faceapi.draw.DrawBox(det.detection.box, { 
                    label: match.toString(),
                    boxColor: match.label !== 'unknown' ? '#10b981' : '#ef4444'
                }).draw(canvas);
            });
        }, 800); // Interval 800ms adalah sweet spot antara akurasi dan performa
    };
}


// ================== LOGIKA ABSENSI TERINTEGRASI ==================
async function recordAttendance(nis) {
    const now = new Date();
    const siswa = siswaData.find(s => s.nis === nis);
    
    // Validasi data dan batasi absensi berulang (jedanya 1 menit)
    if (!siswa || (lastAttendance[nis] && Date.now() - lastAttendance[nis] < 60000)) return;
    
    const type = document.querySelector('input[name="absensi-type"]:checked').value;
    const tgl = now.toISOString().split('T')[0];
    const waktu = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    // Payload data untuk dikirim
    const data = {
        nama: siswa.nama, 
        nis: siswa.nis, 
        kelas: siswa.kelas,
        type: type, // "Masuk" atau "Pulang"
        waktu: waktu,
        tanggal: tgl,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };

    // Feedback Visual: Ubah warna siluet menjadi hijau saat wajah dikenali
    const silhouette = document.getElementById('face-silhouette-svg');
    if (silhouette) silhouette.classList.add('text-green-500', 'scale-110');

    try {
        // A. SIMPAN KE FIRESTORE (Untuk Laporan di Aplikasi)
        const updateData = { ...data };
        if (type.toLowerCase() === 'masuk') updateData.masuk = now.toISOString();
        else updateData.pulang = now.toISOString();

        await db.collection("artifacts").doc(APP_PATH)
                .collection("public").doc("records")
                .collection(tgl).doc(nis).set(updateData, { merge: true });
        
        addLog(`✅ Firestore: ${siswa.nama} (${type})`);

        // B. KIRIM KE GOOGLE SHEETS (Via URL Backend yang tersimpan)
        if (settings.endpointUrl) {
            fetch(settings.endpointUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            addLog(`🚀 Spreadsheet: Data terkirim.`);
        }

    } catch (e) {
        // C. BACKUP OFFLINE (Jika koneksi internet terputus)
        let offlineData = JSON.parse(localStorage.getItem('offline_logs') || "[]");
        offlineData.push({...data, isSync: false});
        localStorage.setItem('offline_logs', JSON.stringify(offlineData));
        addLog(`⚠️ Offline: ${siswa.nama} tersimpan lokal.`);
    } finally {
        // Kembalikan efek visual siluet setelah 1.5 detik
        setTimeout(() => {
            if (silhouette) silhouette.classList.remove('text-green-500', 'scale-110');
        }, 1500);
    }
    
    lastAttendance[nis] = Date.now();
    speak(`${siswa.nama} ${type}`);
}

// ================== HELPERS ==================
function addLog(m) { const d = document.createElement('div'); d.textContent = "> " + m; logContent.prepend(d); }
function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'id-ID'; window.speechSynthesis.speak(u); }

// ================== GPS ==================
let watchId = null; // Variabel global untuk menyimpan ID tracker
let locationBuffer = [];

function startGpsTracking() {
    // Pastikan tidak ada tracker ganda yang berjalan
    if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
    }
    addLog("📡 Memulai pelacakan lokasi...");
    watchId = navigator.geolocation.watchPosition(p => {
        const userLat = p.coords.latitude;
        const userLng = p.coords.longitude;
        // Ambil koordinat target dari settings yang dimuat dari Firestore
        const targetLat = settings.lat;
        const targetLng = settings.lng;
        const radius = settings.radius || 50;
        if (!targetLat || !targetLng) {
            gpsStatus.innerText = "⚠️ KOORDINAT BELUM DISET";
            gpsStatus.className = "bg-yellow-600 text-white p-2 rounded-lg text-[10px]";
            return;
        }

        const dist = calculateDistance(userLat, userLng, targetLat, targetLng);
        locationBuffer.push(dist);
        if (locationBuffer.length > 3) locationBuffer.shift();
        const avgDist = locationBuffer.reduce((a, b) => a + b) / locationBuffer.length;
        isLocationValid = avgDist <= radius;
        if (isLocationValid) {
            gpsStatus.innerText = `📍 AREA SEKOLAH (${Math.round(avgDist)}m)`;
            gpsStatus.className = "bg-green-600 text-white p-2 rounded-lg text-[10px] font-bold";
        } else {
            gpsStatus.innerText = `🚫 DI LUAR AREA (${Math.round(avgDist)}m)`;
            gpsStatus.className = "bg-red-600 text-white p-2 rounded-lg text-[10px] font-bold";
        }
    }, (err) => {
        addLog("❌ GPS Error: " + err.message);
        gpsStatus.innerText = "🚫 GPS MATI / ERROR";
        gpsStatus.className = "bg-black text-white p-2 rounded-lg text-[10px]";
    }, { 
        enableHighAccuracy: true, 
        timeout: 10000, 
        maximumAge: 0 
    });
}

// Logika cerdas: Matikan GPS jika aplikasi di-minimize (hemat baterai)
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            addLog("💤 GPS dinonaktifkan (Background)");
        }
    } else {
        startGpsTracking();
    }
});

function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3; // Radius bumi dalam meter
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + 
              Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * 
              Math.sin(dLon/2)**2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

// ================== CLOUD SETTINGS ==================
function listenToCloudSettings() {
    // Mendengarkan perubahan di Firestore secara real-time
    db.collection("artifacts").doc(APP_PATH)
      .collection("public").doc("config")
      .collection("settings").doc("global").onSnapshot(doc => {
        if (doc.exists) {
            settings = doc.data();
            document.getElementById('csv-url').value = settings.csvUrl || "";
            document.getElementById('endpoint-url').value = settings.endpointUrl || ""; 
            document.getElementById('target-lat').value = settings.lat || "";
            document.getElementById('target-lng').value = settings.lng || "";
            document.getElementById('target-radius').value = settings.radius || 50;
            if (settings.csvUrl) {
                fetchSiswa();
            }
            addLog("⚙️ Konfigurasi & Data Siswa Sinkron.");
            syncFaceDatabase();
        }
    });
}

// ================== DATA SISWA ==================
async function fetchSiswa() {
    const url = document.getElementById('csv-url').value;
    if (!url) return alert("Silahkan masukkan URL CSV!");
    addLog("⏳ Menghubungkan ke database CSV...");
    try {
        const res = await fetch(url);
        const text = await res.text();
        const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
        siswaData = rows.slice(1).map(row => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            return {
                nis: cols[0]?.replace(/"/g, '').trim(),
                nama: cols[1]?.replace(/"/g, '').trim(),
                kelas: cols[2]?.replace(/"/g, '').trim(),
                sesi: cols[3]?.replace(/"/g, '').trim()
            };
        });

        const kelasUnik = [...new Set(siswaData.map(s => s.kelas))].filter(k => k).sort();
        const filterLaporan = document.getElementById('filter-kelas-laporan');
        if (filterLaporan) {
            filterLaporan.innerHTML = '<option value="SEMUA">Semua Kelas</option>' +
                kelasUnik.map(k => `<option value="${k}">${k}</option>`).join('');
        }

        // Update Dropdown Registrasi
        const regKelas = document.getElementById('reg-kelas');
        if (regKelas) {
            regKelas.innerHTML = '<option value="">-- Pilih Kelas --</option>' +
                kelasUnik.map(k => `<option value="${k}">${k}</option>`).join('');
        }

        addLog(`✅ Berhasil: ${siswaData.length} siswa dimuat.`);
    } catch (e) {
        addLog("❌ Gagal Sinkron: " + e.message);
    }
}

// ================== LAPORAN ==================
function loadLaporan() {
    const today = new Date().toISOString().split('T')[0];
    const filterKelas = document.getElementById('filter-kelas-laporan').value;
    db.collection("artifacts").doc(APP_PATH)
      .collection("public").doc("records")
      .collection(today).onSnapshot(snapshot => {
        const container = document.getElementById('laporan-list');
        container.innerHTML = "";
        if (snapshot.empty) {
            container.innerHTML = "<div class='text-center py-10 text-gray-400'>Belum ada data absensi hari ini.</div>";
            return;
        }
        snapshot.forEach(doc => {
            const item = doc.data();
            if (filterKelas !== "SEMUA" && item.kelas !== filterKelas) return;
            const div = document.createElement('div');
            div.className = "flex justify-between items-center p-4 bg-gray-50 dark:bg-slate-800/50 rounded-xl border border-gray-100 dark:border-slate-800";
            div.innerHTML = `
                <div>
                    <div class="font-bold text-slate-900 dark:text-white">${item.nama}</div>
                    <div class="text-[10px] text-gray-500 uppercase">${item.nis} • ${item.kelas}</div>
                </div>
                <div class="text-right">
                    <div class="text-[10px] font-bold ${item.masuk ? 'text-green-500' : 'text-gray-400'}">MASUK: ${item.masuk ? new Date(item.masuk).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--'}</div>
                    <div class="text-[10px] font-bold ${item.pulang ? 'text-red-500' : 'text-gray-400'}">PULANG: ${item.pulang ? new Date(item.pulang).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--'}</div>
                </div>
            `;
            container.appendChild(div);
        });
    });
}

function exportLaporan() {
    const today = new Date().toISOString().split('T')[0];
    addLog("⏳ Menyiapkan file laporan...");
    db.collection("artifacts").doc(APP_PATH)
      .collection("public").doc("records")
      .collection(today).get().then(snapshot => {
        if (snapshot.empty) return alert("Tidak ada data untuk diunduh hari ini.");

        let csv = "NIS,Nama,Kelas,Jam Masuk,Jam Pulang\n";
        snapshot.forEach(doc => {
            const d = doc.data();
            const jamMasuk = d.masuk ? new Date(d.masuk).toLocaleTimeString() : "-";
            const jamPulang = d.pulang ? new Date(d.pulang).toLocaleTimeString() : "-";
            csv += `"${d.nis}","${d.nama}","${d.kelas}","${jamMasuk}","${jamPulang}"\n`;
        });
        
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `Rekap_Absensi_${today}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        addLog("✅ Laporan berhasil diunduh.");
    }).catch(err => alert("Gagal ekspor: " + err.message));
}

// ================== PENDAFTARAN WAJAH (REGISTRATION) ==================
async function registerFace() {
    const regStatus = document.getElementById('reg-status');
    const nama = document.getElementById('reg-siswa').value;
    const kelas = document.getElementById('reg-kelas').value;
    const nisSiswa = siswaData.find(s => s.nama === nama)?.nis;

    if (!nama || !kelas || !nisSiswa) {
        regStatus.innerText = "❌ Pilih Kelas & Nama dulu!";
        regStatus.className = "mt-4 font-bold text-sm text-red-500";
        return;
    }

    regStatus.innerText = "⏳ Memproses wajah... Jangan bergerak";
    regStatus.className = "mt-4 font-bold text-sm text-blue-500";

    try {
        // 1. Deteksi wajah dari video saat ini
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptor();

        if (!detection) {
            regStatus.innerText = "❌ Wajah tidak terdeteksi!";
            regStatus.className = "mt-4 font-bold text-sm text-red-500";
            return;
        }

        // 2. Konversi descriptor ke format String agar bisa disimpan di Firestore
        const descriptorArray = Array.from(detection.descriptor);
        const descriptorString = JSON.stringify(descriptorArray);

        // 3. Simpan ke Firestore
        await db.collection("artifacts").doc(APP_PATH)
            .collection("public").doc("biometrics")
            .collection("face_data").doc(nisSiswa).set({
                nis: nisSiswa,
                nama: nama,
                kelas: kelas,
                descriptor: descriptorString,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });

        regStatus.innerText = `✅ Wajah ${nama} Berhasil Terdaftar!`;
        regStatus.className = "mt-4 font-bold text-sm text-green-500";
        
        // 4. Update database wajah lokal agar bisa langsung absen tanpa refresh
        addLog(`👤 Wajah baru terdaftar: ${nama}`);
        await syncFaceDatabase(); 

    } catch (e) {
        console.error(e);
        regStatus.innerText = "❌ Gagal menyimpan ke cloud";
        regStatus.className = "mt-4 font-bold text-sm text-red-500";
    }
}

// ================== SETTINGS ==================
function saveSettings() {
    const newSettings = {
        csvUrl: document.getElementById('csv-url').value,
        endpointUrl: document.getElementById('endpoint-url').value, // URL Backend kini ikut tersimpan
        lat: parseFloat(document.getElementById('target-lat').value) || 0,
        lng: parseFloat(document.getElementById('target-lng').value) || 0,
        radius: parseInt(document.getElementById('target-radius').value) || 50
    };
    db.collection("artifacts").doc(APP_PATH)
      .collection("public").doc("config")
      .collection("settings").doc("global").set(newSettings)
        .then(() => {
            alert("Berhasil! Pengaturan tersimpan dan sinkron ke semua perangkat.");
            addLog("✅ Pengaturan global diperbarui.");
        })
        .catch(err => {
            alert("Gagal menyimpan: " + err.message);
        });
}

async function switchTab(id) {
    if (id === 'pengaturan') {
        const token = prompt("Masukkan Token Keamanan:");
        if (token !== "pengaturan123") { 
            alert("Akses Ditolak!"); 
            return; 
        }
        // Pindahkan video ke tab pengaturan
        const placeholder = document.getElementById('camera-placeholder-reg');
        const videoElement = document.getElementById('video');
        placeholder.appendChild(videoElement);
        placeholder.classList.remove('hidden');
    } else if (id === 'absensi') {
        // Kembalikan video ke tab absensi
        const absensiContainer = document.querySelector('#absensi .video-container');
        const videoElement = document.getElementById('video');
        absensiContainer.insertBefore(videoElement, absensiContainer.firstChild);
        document.getElementById('camera-placeholder-reg').classList.add('hidden');
    }

    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
}

}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-pwa').classList.remove('hidden');
});

function installApp() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choice => {
        if (choice.outcome === 'accepted') console.log('User accepted install');
        deferredPrompt = null;
    });
}
