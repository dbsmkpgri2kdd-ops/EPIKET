    <script>
// ================== CONFIG & INIT ==================
const config = {
    apiKey: "AIzaSyC8KQzupwLouy6zSxiz5V5-kB6jPvigCII",
    authDomain: "e-absensi-9be8b.firebaseapp.com",
    projectId: "e-absensi-9be8b",
    databaseURL: "https://e-absensi-9be8b-default-rtdb.firebaseio.com",
    storageBucket: "e-absensi-9be8b.firebasestorage.app",
    messagingSenderId: "828041116350", 
    appId: "1:828041116350:web:8cf5617195e140ec58fcef"
};

firebase.initializeApp(config);
const db = firebase.database();
const BIOMETRIC_PATH = `artifacts/${config.appId}/biometrics_module`;

let siswaData = [], settings = {}, isLocationValid = false;
let faceMatcher = null, lastAttendance = {};

const video = document.getElementById('video');
const logContent = document.getElementById('log-content');
const gpsStatus = document.getElementById('gps-status');

window.onload = async () => {
    initTheme();
    listenToCloudSettings();
    await loadModels();
    startVideo();
    startGpsTracking();
    initFaceDetection();
};

// ================== CORE FUNCTIONS ==================

async function loadModels() {
    addLog("⏳ Memuat AI...");
    const URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
    await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(URL)
    ]);
    addLog("✅ AI Siap.");
}

function startVideo() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(s => video.srcObject = s)
        .catch(() => addLog("❌ Kamera Gagal."));
}

async function syncFaceDatabase() {
    if (!settings.endpointUrl) return;
    try {
        const res = await fetch(`${settings.endpointUrl}?action=getBiometrics`);
        const data = await res.json();
        if (data?.length) {
            faceMatcher = new faceapi.FaceMatcher(data.map(d => 
                new faceapi.LabeledFaceDescriptors(d.nama, [new Float32Array(JSON.parse(d.descriptor))])
            ), 0.45);
            addLog(`✅ ${data.length} wajah tersinkron.`);
        }
    } catch (e) { addLog("⚠️ DB Wajah Kosong."); }
}

async function recordAttendance(nama) {
    const now = Date.now();
    // Jeda 5 menit agar tidak dobel absen
    if (lastAttendance[nama] && (now - lastAttendance[nama] < 300000)) return;
    
    const type = document.querySelector('input[name="absensi-type"]:checked').value;
    const info = siswaData.find(s => s.nama === nama);
    
    lastAttendance[nama] = now;
    
    try {
        addLog(`⏳ Mengirim: ${nama}...`);
        await fetch(settings.endpointUrl, {
            method: 'POST',
            body: JSON.stringify({
                action: 'attendance_biometric',
                nama: nama,
                nis: info?.nis || "-",
                type: type,
                location: gpsStatus.innerText
            })
        });
        addLog(`✅ BERHASIL: ${nama}`);
        speak(`${nama}, ${type} sukses`);
    } catch (e) { addLog("❌ Gagal Kirim."); }
}

function initFaceDetection() {
    video.onplay = () => {
        if (document.querySelector('canvas')) return;
        const canvas = faceapi.createCanvasFromMedia(video);
        document.querySelector('.video-container').append(canvas);
        const size = { width: video.clientWidth, height: video.clientHeight };
        faceapi.matchDimensions(canvas, size);

        setInterval(async () => {
            if (!isLocationValid) {
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                return;
            }
            const dets = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                                     .withFaceLandmarks().withFaceDescriptors();
            const resized = faceapi.resizeResults(dets, size);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            
            if (faceMatcher && resized.length) {
                resized.forEach(d => {
                    const res = faceMatcher.findBestMatch(d.descriptor);
                    new faceapi.draw.DrawBox(d.detection.box, { label: res.label }).draw(canvas);
                    if (res.label !== 'unknown' && res.distance < 0.45) recordAttendance(res.label);
                });
            }
        }, 600);
    };
}

// ================== GPS & SETTINGS ==================

function startGpsTracking() {
    navigator.geolocation.watchPosition(p => {
        if (!settings.lat) return gpsStatus.innerText = "MENUNGGU CONFIG...";
        
        const accuracy = p.coords.accuracy; // dalam meter
        const dist = calculateDistance(p.coords.latitude, p.coords.longitude, settings.lat, settings.lng);
        
        // Anggap lokasi valid jika dalam radius DAN akurasi GPS di bawah 100 meter
        const isWithinRadius = dist <= settings.radius;
        const isAccurate = accuracy < 100; 
        
        isLocationValid = isWithinRadius && isAccurate;

        if (!isAccurate) {
            gpsStatus.innerText = `SINYAL LEMAH (Akurasi: ${Math.round(accuracy)}m)`;
            gpsStatus.className = "mb-4 p-2 rounded-lg text-center font-bold text-[10px] bg-orange-100 text-orange-700";
        } else {
            gpsStatus.innerText = isWithinRadius ? `LOKASI SESUAI (${Math.round(dist)}m)` : `DILUAR RADIUS (${Math.round(dist)}m)`;
            gpsStatus.className = `mb-4 p-2 rounded-lg text-center font-bold text-[10px] ${isWithinRadius ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
        }
        
    }, e => addLog("GPS Error: " + e.message), { 
        enableHighAccuracy: true,
        timeout: 5000,
        maximumAge: 0 
    });
}

function calculateDistance(la1, lo1, la2, lo2) {
    const R = 6371e3;
    const dLat = (la2 - la1) * Math.PI / 180;
    const dLon = (lo2 - lo1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 + Math.cos(la1 * Math.PI / 180) * Math.cos(la2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

async function fetchSiswa() {
    const url = document.getElementById('csv-url').value;
    if (!url) return alert("URL Kosong!");
    addLog("⏳ Sinkron Siswa...");
    
    try {
        const res = await fetch(url);
        const data = await res.text();
        
        // Memisahkan baris dan membersihkan spasi kosong
        const rows = data.split(/\r?\n/).filter(r => r.trim() !== "");
        
        // Lewati header (baris pertama)
        const contentRows = rows.slice(1);
        
siswaData = contentRows.map(r => {
    // Memisahkan kolom berdasarkan koma, menangani tanda kutip (misal: "Nama, Gelar")
    const clean = r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
    const val = clean.map(v => v.replace(/"/g, '').trim());
    
    return { 
        nama: val || "",  // Mengambil kolom ke-2 (Nama)
        nis: val || "",   // Mengambil kolom ke-1 (NIS)
        kelas: val || ""  // Mengambil kolom ke-3 (Kelas)
    };
}).filter(s => s.nama);

        // Update Dropdown Kelas
        const kelasSet = [...new Set(siswaData.map(s => s.kelas))].filter(k => k).sort();
        document.getElementById('reg-kelas').innerHTML = '<option value="">-- Pilih Kelas --</option>' + 
            kelasSet.map(k => `<option value="${k}">${k}</option>`).join('');
            
        addLog(`✅ ${siswaData.length} Siswa Terload.`);
    } catch (e) { 
        addLog("❌ Gagal Load CSV: " + e.message); 
    }
}

// ================== UI HELPERS ==================

function addLog(m) {
    const d = document.createElement('div');
    d.textContent = `> ${m}`;
    logContent.prepend(d);
}

function speak(t) {
    const m = new SpeechSynthesisUtterance(t);
    m.lang = 'id-ID';
    window.speechSynthesis.speak(m);
}

function saveSettings() {
    settings = {
        csvUrl: document.getElementById('csv-url').value,
        endpointUrl: document.getElementById('endpoint-url').value,
        lat: parseFloat(document.getElementById('target-lat').value),
        lng: parseFloat(document.getElementById('target-lng').value),
        radius: parseInt(document.getElementById('target-radius').value)
    };
    db.ref(`${BIOMETRIC_PATH}/settings`).set(settings).then(() => {
        alert("Tersimpan ke Cloud!");
        syncFaceDatabase();
    });
}

function listenToCloudSettings() {
    db.ref(`${BIOMETRIC_PATH}/settings`).on('value', snap => {
        const d = snap.val();
        if (!d) return;
        settings = d;
        const fields = { 'csv-url': d.csvUrl, 'endpoint-url': d.endpointUrl, 'target-lat': d.lat, 'target-lng': d.lng, 'target-radius': d.radius };
        Object.entries(fields).forEach(([id, val]) => { if(document.getElementById(id)) document.getElementById(id).value = val || ""; });
        addLog("⚙️ Config Cloud Aktif.");
        syncFaceDatabase();
    });
}

function updateRegNama() {
    const k = document.getElementById('reg-kelas').value;
    const filtered = siswaData.filter(s => s.kelas === k);
    document.getElementById('reg-siswa').innerHTML = '<option value="">-- Pilih Nama --</option>' + 
        filtered.map(s => `<option value="${s.nama}">${s.nama}</option>`).join('');
}

function initTheme() {
    const isDark = localStorage.getItem('theme') === 'dark';
    document.documentElement.classList.toggle('dark', isDark);
    document.getElementById('theme-icon-sun').classList.toggle('hidden', !isDark);
    document.getElementById('theme-icon-moon').classList.toggle('hidden', isDark);
}

function toggleDarkMode() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    document.getElementById('theme-icon-sun').classList.toggle('hidden', !isDark);
    document.getElementById('theme-icon-moon').classList.toggle('hidden', isDark);
}

function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function toggleMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }
function setCurrentLocation() {
    navigator.geolocation.getCurrentPosition(p => {
        document.getElementById('target-lat').value = p.coords.latitude;
        document.getElementById('target-lng').value = p.coords.longitude;
    });
}

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    // tampilkan tombol
    document.getElementById('install-pwa').classList.remove('hidden');
});

function installApp() {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();

    deferredPrompt.userChoice.then(choice => {
        if (choice.outcome === 'accepted') {
            console.log('User accepted install');
        }
        deferredPrompt = null;
    });
}

    </script>
