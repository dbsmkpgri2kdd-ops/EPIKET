 <script>

// ================== CONFIG & INIT ==================
const firebaseConfig = {
    apiKey: "AIzaSyC8KQzupwLouy6zSxiz5V5-kB6jPvigCII",
    authDomain: "e-absensi-9be8b.firebaseapp.com",
    projectId: "e-absensi-9be8b",
    databaseURL: "https://e-absensi-9be8b-default-rtdb.firebaseio.com",
    storageBucket: "e-absensi-9be8b.firebasestorage.app",
    messagingSenderId: "828041116350", 
    appId: "1:828041116350:web:8cf5617195e140ec58fcef"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const APP_PATH = "stm-pgri2-kdd-v3";
// Gunakan variabel ini secara konsisten di semua fungsi
const BIOMETRIC_PATH = `artifacts/${APP_PATH}/biometrics`; 
const SETTINGS_PATH = `artifacts/${APP_PATH}/config/settings`;

let siswaData = [], settings = {}, isLocationValid = false;
let faceMatcher = null, lastAttendance = {};
let currentFacingMode = "user", currentStream = null;

const video = document.getElementById('video');
const logContent = document.getElementById('log-content');
const gpsStatus = document.getElementById('gps-status');

// ================== INITIALIZATION ==================
window.onload = async () => {
    initTheme();
    listenToCloudSettings();
    await loadModels();
    await startVideo();
    startGpsTracking();
    initFaceDetection();
    loadLaporan();
    autoSelectType();
};

async function loadModels() { 
    addLog("⏳ Memuat AI..."); 
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/'; 
    try {
        await Promise.all([ 
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL), 
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL), 
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL) 
        ]); 
        addLog("✅ AI Siap.");
    } catch (e) { addLog("❌ Gagal memuat model AI"); }
}

// ================== CAMERA & FACE CORE ==================
async function startVideo() { 
    try { 
        if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); } 
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } } 
        }); 
        currentStream = stream; 
        video.srcObject = stream; 
    } catch (err) { addLog("❌ Kamera gagal: " + err.message); } 
}

function switchCamera() { 
    currentFacingMode = currentFacingMode === "user" ? "environment" : "user"; 
    addLog("🔄 Ganti kamera..."); 
    startVideo(); 
}

async function syncFaceDatabase() { 
    addLog("🔄 Sinkronisasi wajah..."); 
    try {
        // Gunakan .ref() untuk Realtime Database (Anda pakai compat SDK)
        const snap = await db.ref(`${BIOMETRIC_PATH}/face_data`).once('value');
        const data = snap.val(); 
        if (!data) return addLog("⚠️ Database Cloud Kosong."); 

        const labeled = Object.entries(data).map(([id, user]) => { 
            const desc = new Float32Array(JSON.parse(user.descriptor)); 
            return new faceapi.LabeledFaceDescriptors(user.nama, [desc]); 
        }); 
        faceMatcher = new faceapi.FaceMatcher(labeled, 0.45);
        addLog("✅ Database Wajah Sinkron."); 
    } catch (e) { 
        console.error(e);
        addLog("❌ Gagal sinkron: " + e.message); 
    }
}

let faceDetectionInterval;
async function initFaceDetection() { 
    video.onplay = () => {
        // Hapus canvas lama jika ada untuk mencegah penumpukan
        const oldCanvas = document.querySelector('canvas');
        if (oldCanvas) oldCanvas.remove();
        const canvas = faceapi.createCanvasFromMedia(video);
        document.querySelector('.video-container').append(canvas);
        const updateDimensions = () => {
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, displaySize);
            return displaySize;
        };

        let displaySize = updateDimensions();
        if (faceDetectionInterval) clearInterval(faceDetectionInterval);
        faceDetectionInterval = setInterval(async () => {
            if (!isLocationValid || !faceMatcher || document.hidden) return;
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks().withFaceDescriptors();
            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            resizedDetections.forEach(detection => {
                const result = faceMatcher.findBestMatch(detection.descriptor);
                const drawBox = new faceapi.draw.DrawBox(detection.detection.box, { 
                    label: result.toString(), 
                    boxColor: result.label !== 'unknown' ? '#10b981' : '#ef4444' 
                });
                drawBox.draw(canvas);
                if (result.label !== 'unknown' && result.distance < 0.45) {
                    recordAttendance(result.label);
                }
            });
        }, 1000);
    };
}

// ================== ATTENDANCE LOGIC ==================
async function recordAttendance(nama) {
    const now = new Date();
    const tglHariIni = now.toISOString().split('T')[0];
    const typeSelected = document.querySelector('input[name="absensi-type"]:checked').value;
    const siswa = siswaData.find(s => s.nama === nama);
    
    // Cooldown & Validasi
    if (!siswa || (lastAttendance[nama] && Date.now() - lastAttendance[nama] < 30000)) return;
    
    if (!isValidSession(siswa.sesi)) {
        addLog(`⛔ ${nama}: Bukan sesi ${siswa.sesi}`);
        return;
    }

    try {
        const studentKey = nama.replace(/\s+/g, '_');
        const ref = db.ref(`absensi/${tglHariIni}/${studentKey}`);
        const snap = await ref.once('value');
        const currentData = snap.val() || { nama, nis: siswa.nis, kelas: siswa.kelas, sesi: siswa.sesi };

        // Cegah Dobel Absen
        if (typeSelected === "Masuk" && currentData.masuk) return;
        if (typeSelected === "Pulang" && currentData.pulang) return;

        currentData[typeSelected.toLowerCase()] = now.toISOString();
        await ref.set(currentData);

        // Kirim ke Google Apps Script (Jika ada URL)
        if (settings.endpointUrl) {
            fetch(settings.endpointUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'attendance_biometric', 
                    nama: nama, 
                    nis: siswa.nis, 
                    type: typeSelected, 
                    location: gpsStatus.innerText,
                    timestamp: now.toISOString() 
                })
            });
        }

        lastAttendance[nama] = Date.now();
        addLog(`✅ ${nama} ${typeSelected} Berhasil`);
        speak(`${nama} ${typeSelected} berhasil`);
    } catch (e) { 
        addLog("❌ Gagal simpan ke database"); 
        console.error(e);
    }
}

// ================== REGISTRATION ==================
async function registerFace() { 
    const namaSiswa = document.getElementById('reg-siswa').value; 
    const kelasSiswa = document.getElementById('reg-kelas').value; 
    const statusDiv = document.getElementById('reg-status'); 
    
    if (!namaSiswa) return alert("Pilih siswa!"); 
    
    statusDiv.innerText = "⏳ Memindai...";
    statusDiv.className = "mt-4 font-bold text-sm text-blue-500";
    
    // Pastikan video aktif saat scan
    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
        .withFaceLandmarks().withFaceDescriptor(); 
    
    if (detection) { 
        const descriptorArray = Array.from(detection.descriptor); 
        const studentId = namaSiswa.replace(/\s+/g, '_').toLowerCase(); 
        
        // PERBAIKAN: Menggunakan BIOMETRIC_PATH yang benar
        db.ref(`${BIOMETRIC_PATH}/face_data/${studentId}`).set({ 
            nama: namaSiswa, 
            kelas: kelasSiswa, 
            descriptor: JSON.stringify(descriptorArray), 
            updatedAt: firebase.database.ServerValue.TIMESTAMP 
        }).then(() => { 
            statusDiv.innerText = "✅ Berhasil Terdaftar!"; 
            statusDiv.className = "mt-4 font-bold text-sm text-green-500";
            syncFaceDatabase(); 
        }).catch(err => {
            statusDiv.innerText = "❌ Gagal Simpan: " + err.message;
        }); 
    } else { 
        statusDiv.innerText = "❌ Wajah Tidak Terdeteksi!"; 
        statusDiv.className = "mt-4 font-bold text-sm text-red-500";
    } 
}

// ================== HELPERS ==================
function addLog(m) { 
    const d = document.createElement('div'); 
    d.textContent = "> " + m; 
    logContent.prepend(d); 
}

function speak(t) {
    window.speechSynthesis.cancel(); // Hentikan suara sebelumnya
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'id-ID';
    window.speechSynthesis.speak(u);
}

function autoSelectType() {
    const jam = new Date().getHours();
    document.querySelector(jam >= 14 ? 'input[value="Pulang"]' : 'input[value="Masuk"]').checked = true;
}

function isValidSession(sesi) {
    const jam = new Date().getHours();
    if (sesi === "Pagi") return jam >= 6 && jam <= 14;
    if (sesi === "Siang") return jam >= 11 && jam <= 18;
    return true;
}

function startGpsTracking() {
    if (!navigator.geolocation) return addLog("GPS Tidak Didukung");
    navigator.geolocation.watchPosition(p => {
        if (settings.lat == null || settings.lng == null) {
            gpsStatus.innerText = "Konfigurasi GPS Belum Diset";
            return;
        }
        
        const dist = calculateDistance(p.coords.latitude, p.coords.longitude, settings.lat, settings.lng);
        isLocationValid = dist <= settings.radius;
        
        if (isLocationValid) {
            gpsStatus.innerText = `📍 Lokasi Sesuai (${Math.round(dist)}m)`;
            gpsStatus.className = "mb-4 p-3 rounded-xl text-center font-bold bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 border border-green-200 text-[10px] uppercase";
        } else {
            gpsStatus.innerText = `🚫 Di Luar Jangkauan (${Math.round(dist)}m)`;
            gpsStatus.className = "mb-4 p-3 rounded-xl text-center font-bold bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 border border-red-200 text-[10px] uppercase";
        }
    }, e => {
        addLog("❌ Error GPS: " + e.message);
    }, { enableHighAccuracy: true });
}

function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function listenToCloudSettings() {
    db.ref(SETTINGS_PATH).on('value', snap => {
        settings = snap.val() || {};
        if (settings.csvUrl) {
            document.getElementById('csv-url').value = settings.csvUrl;
            document.getElementById('endpoint-url').value = settings.endpointUrl || "";
            document.getElementById('target-lat').value = settings.lat || "";
            document.getElementById('target-lng').value = settings.lng || "";
            document.getElementById('target-radius').value = settings.radius || 50;
            addLog("⚙️ Konfigurasi Dimuat.");
        }
        syncFaceDatabase();
    });
}


function toggleFullscreenCamera() { 
    const container = document.querySelector('.video-container'); 
    if (!document.fullscreenElement) { 
        container.classList.add('video-fullscreen'); 
        container.requestFullscreen();
    } else { 
        document.exitFullscreen(); 
        container.classList.remove('video-fullscreen'); 
    }
    // Trigger resize canvas setelah transisi
    setTimeout(() => {
        const canvas = document.querySelector('canvas');
        if (canvas) {
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, displaySize);
        }
    }, 500);
}





async function fetchSiswa() {
    const url = document.getElementById('csv-url').value;
    if (!url) return alert("URL Kosong!");
    addLog("⏳ Sinkron Data Siswa...");
    try {
        const res = await fetch(url);
        const text = await res.text();
        const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
        const content = rows.slice(1);
	siswaData = content.map(row => {
	    // Regex yang lebih aman untuk menangani koma di dalam tanda kutip
	    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
	    return {
        nis: cols?.replace(/"/g, '').trim(),
        nama: cols?.replace(/"/g, '').trim(),
        kelas: cols?.replace(/"/g, '').trim(),
        sesi: cols?.replace(/"/g, '').trim()
	    };
	});

        const kelasUnik = [...new Set(siswaData.map(s => s.kelas))].sort();
        document.getElementById('reg-kelas').innerHTML =
            '<option value="">-- Pilih Kelas --</option>' + kelasUnik.map(k => `<option value="${k}">${k}</option>`).join('');
        addLog(`✅ ${siswaData.length} siswa berhasil dimuat`);
    } catch (e) {
        addLog("❌ Gagal load CSV: " + e.message);
    }
}



function loadLaporan() {
    const today = new Date().toISOString().split('T')[0];
    db.ref(`absensi/${today}`).on('value', snap => {
        const data = snap.val();
        const container = document.getElementById('laporan-list');
        container.innerHTML = "";
        if (!data) return;
        Object.values(data).forEach(item => {
            const div = document.createElement('div');
            div.className = "p-3 bg-gray-100 dark:bg-slate-800 rounded-lg";
            div.innerHTML = `
                <b>${item.nama}</b> (${item.kelas})<br>
                Masuk: ${item.masuk ? new Date(item.masuk).toLocaleTimeString() : '-'}<br>
                Pulang: ${item.pulang ? new Date(item.pulang).toLocaleTimeString() : '-'}
            `;
            container.appendChild(div);
        });
    });
}

function saveSettings() { 
    const newSettings = { 
        csvUrl: document.getElementById('csv-url').value, 
        endpointUrl: document.getElementById('endpoint-url').value, 
        lat: parseFloat(document.getElementById('target-lat').value) || 0, 
        lng: parseFloat(document.getElementById('target-lng').value) || 0, 
        radius: parseInt(document.getElementById('target-radius').value) || 50 
    }; 
    
    // PERBAIKAN: Path yang benar
    db.ref(SETTINGS_PATH).set(newSettings)
      .then(() => { 
          alert("Tersimpan ke Cloud!"); 
          settings = newSettings; // Update local settings
          syncFaceDatabase(); 
      }).catch(err => alert("Gagal simpan: " + err.message)); 
}

function updateRegNama() { 
    const k = document.getElementById('reg-kelas').value; 
    const filtered = siswaData.filter(s => s.kelas === k); 
    document.getElementById('reg-siswa').innerHTML = '<option value="">-- Pilih Nama --</option>' + 
        filtered.map(s => `<option value="${s.nama}">${s.nama}</option>`).join(''); 
}
